<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0a2d1a"/>
      <stop offset="55%" stop-color="#04140a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#48ffa3"/>
      <stop offset="100%" stop-color="#00b359"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b359" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00b359" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="1.2"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="260" r="360" fill="url(#glow)"/>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.75">
    <circle cx="90"  cy="80"  r="1.5"/>
    <circle cx="180" cy="140" r="1"/>
    <circle cx="260" cy="60"  r="1.8"/>
    <circle cx="340" cy="180" r="1"/>
    <circle cx="430" cy="90"  r="1.3"/>
    <circle cx="520" cy="40"  r="1"/>
    <circle cx="710" cy="70"  r="1.6"/>
    <circle cx="830" cy="130" r="1"/>
    <circle cx="920" cy="60"  r="1.4"/>
    <circle cx="1020" cy="150" r="1"/>
    <circle cx="1100" cy="90" r="1.8"/>
    <circle cx="60"  cy="520" r="1.2"/>
    <circle cx="170" cy="580" r="1"/>
    <circle cx="290" cy="540" r="1.6"/>
    <circle cx="450" cy="590" r="1"/>
    <circle cx="600" cy="560" r="1.2"/>
    <circle cx="770" cy="600" r="1.4"/>
    <circle cx="900" cy="540" r="1"/>
    <circle cx="1050" cy="590" r="1.5"/>
    <circle cx="1140" cy="520" r="1"/>
  </g>

  <!-- badge -->
  <g transform="translate(600 120)" text-anchor="middle">
    <rect x="-175" y="-22" width="350" height="40" rx="20" fill="rgba(0,179,89,0.12)" stroke="#00b359" stroke-opacity="0.5"/>
    <circle cx="-150" cy="-2" r="4" fill="#48ffa3"/>
    <text x="0" y="5" font-family="'Kanit','IBM Plex Sans Thai',sans-serif" font-size="15" font-weight="600" fill="#48ffa3" letter-spacing="3">MULTIPLAYER RETRO PLATFORM</text>
  </g>

  <!-- title -->
  <text x="600" y="265" text-anchor="middle"
        font-family="'Kanit','IBM Plex Sans Thai',sans-serif"
        font-size="130" font-weight="800" fill="url(#title)" letter-spacing="-3">Retrospective</text>

  <!-- tagline -->
  <text x="600" y="315" text-anchor="middle"
        font-family="'Kanit',sans-serif" font-size="26" font-weight="500"
        fill="#48ffa3" letter-spacing="6">REFLECT · ADAPT · IMPROVE</text>

  <!-- sample cards -->
  <g font-family="'IBM Plex Sans Thai','Kanit',sans-serif">
    <!-- Went Well -->
    <g transform="translate(210 395) rotate(-4)">
      <rect width="240" height="140" rx="16" fill="#0b1a12" stroke="#00b359" stroke-opacity="0.55"/>
      <rect x="0" y="0" width="240" height="6" rx="3" fill="#00b359"/>
      <text x="18" y="40" font-size="14" font-weight="700" fill="#48ffa3" letter-spacing="2">WENT WELL</text>
      <text x="18" y="75" font-size="16" font-weight="500" fill="#e6fff1">Shipped the new</text>
      <text x="18" y="96" font-size="16" font-weight="500" fill="#e6fff1">onboarding flow 🚀</text>
      <text x="210" y="122" text-anchor="end" font-size="14" font-weight="600" fill="#48ffa3">▲ 7</text>
    </g>
    <!-- Improve -->
    <g transform="translate(480 375)">
      <rect width="240" height="140" rx="16" fill="#1a0d14" stroke="#ff6fa8" stroke-opacity="0.55"/>
      <rect x="0" y="0" width="240" height="6" rx="3" fill="#ff6fa8"/>
      <text x="18" y="40" font-size="14" font-weight="700" fill="#ff9ec5" letter-spacing="2">IMPROVE</text>
      <text x="18" y="75" font-size="16" font-weight="500" fill="#ffe6f0">Standups running</text>
      <text x="18" y="96" font-size="16" font-weight="500" fill="#ffe6f0">too long ⏳</text>
      <text x="210" y="122" text-anchor="end" font-size="14" font-weight="600" fill="#ff9ec5">▲ 5</text>
    </g>
    <!-- Not Sure -->
    <g transform="translate(750 395) rotate(4)">
      <rect width="240" height="140" rx="16" fill="#0b1220" stroke="#7fb7ff" stroke-opacity="0.55"/>
      <rect x="0" y="0" width="240" height="6" rx="3" fill="#7fb7ff"/>
      <text x="18" y="40" font-size="14" font-weight="700" fill="#a8ccff" letter-spacing="2">NOT SURE</text>
      <text x="18" y="75" font-size="16" font-weight="500" fill="#e8f0ff">Try pair-programming</text>
      <text x="18" y="96" font-size="16" font-weight="500" fill="#e8f0ff">for feature work? 🤔</text>
      <text x="210" y="122" text-anchor="end" font-size="14" font-weight="600" fill="#a8ccff">▲ 3</text>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(600 580)" text-anchor="middle" font-family="'Kanit',sans-serif">
    <text font-size="18" font-weight="600" fill="#8fffc0" letter-spacing="2">RETROQUEST  ·  BBT PRODUCT</text>
  </g>
</svg>
